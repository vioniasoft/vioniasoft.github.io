<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | VioniaSoft</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #060610;
      color: #f0eeff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 50% 30%, rgba(120,80,255,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 30% 30% at 80% 20%, rgba(56,213,255,0.04) 0%, transparent 50%),
        radial-gradient(ellipse 25% 25% at 15% 70%, rgba(179,92,255,0.03) 0%, transparent 50%),
        #060610;
    }

    .glow {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.12), transparent 60%);
      filter: blur(60px);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    h1 {
      font-size: clamp(100px, 20vw, 180px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #c4b5fd 40%, #a78bfa 70%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px rgba(167,139,250,0.35));
      margin-bottom: 16px;
    }

    h2 {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 600;
      color: #b4b0d4;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      color: #7873a0;
      max-width: 420px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 32px rgba(129,140,248,0.35);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 44px rgba(129,140,248,0.55);
    }

    .btn svg {
      transition: transform 0.3s ease;
    }

    .btn:hover svg {
      transform: translateX(3px);
    }

    .footer-text {
      position: absolute;
      bottom: 28px;
      font-size: 11px;
      color: #3d3860;
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <h1>404</h1>
  <h2>Page not found</h2>
  <p>찾고 계신 페이지가 존재하지 않거나 이동되었습니다.<br>홈페이지로 돌아가 원하시는 정보를 찾아보세요.</p>

  <a href="/" class="btn">
    Back to Home
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"/>
      <polyline points="15 6 21 12 15 18"/>
    </svg>
  </a>

  <span class="footer-text">© 2025 VioniaSoft. All rights reserved.</span>

</body>
</html>

<!-- assets/partials/nav.html -->
<nav class="nav" id="mainNav" aria-label="메인 네비게이션">
    <div class="nav-inner" id="navApp" v-cloak>
        <!-- Logo -->
        <div class="nav-logo">
            <a href="index.html">
                <img src="assets/images/common/vioniasoft_logo.png" class="nav-logo-img" alt="VioniaSoft 비오니아소프트 서비스 대표 이미지">
            </a>
        </div>

        <!-- ☰ 移动端 -->
        <div class="nav-toggle mobile-only" @click="toggleMenu">
            ☰
        </div>

        <!-- 菜单 -->
        <ul class="nav-menu" :class="{ open: menuOpen }">
            <li @click="go('index.html')">{{ t.nav.home }}</li>
            <li @click="go('about.html')">{{ t.nav.about }}</li>
            <li @click="go('services.html')">{{ t.nav.services }}</li>
            <li @click="go('contact.html')">{{ t.nav.contact }}</li>

            <!-- 移动端语言 -->
            <li class="mobile-lang" @click.stop="langOpen = !langOpen">
                <span>&#127758; Language</span>
                <span class="mobile-lang-arrow" :class="{ open: langOpen }"> ▶</span>
            </li>
            <li v-if="langOpen" class="mobile-lang-item" @click="switchLang('ko')">한국어</li>
            <li v-if="langOpen" class="mobile-lang-item" @click="switchLang('en')">English</li>
            <li v-if="langOpen" class="mobile-lang-item" @click="switchLang('zh')">中文</li>
            <li v-if="langOpen" class="mobile-lang-item" @click="switchLang('fr')">Français</li>
        </ul>

        <!-- 指示条（桌面） -->
        <div class="nav-indicator" ref="indicator"></div>

        <!-- 桌面语言 -->
        <div class="nav-lang desktop-only" @click.stop>
            <div class="lang-btn" @click="open = !open">
                &#127758; {{ lang === 'ko' ? '한국어' : lang === 'en' ? 'English' : lang === 'zh' ? '中文' : 'Français' }}
            </div>
            <div class="lang-dropdown" v-if="open">
                <div @click="switchLang('ko')">한국어</div>
                <div @click="switchLang('en')">English</div>
                <div @click="switchLang('zh')">中文</div>
                <div @click="switchLang('fr')">Français</div>
            </div>
        </div>
    </div>
</nav>

<!-- index.html -->
<!DOCTYPE html>
<html lang="ko" id="htmlRoot">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VioniaSoft | {{ t.home.heroTitle }}</title>
  <meta name="description" content="VioniaSoft IT 개발 회사. 시스템 통합(SI), 서비스 관리(SM), 웹 솔루션 제공.">
  <meta name="keywords" content="VioniaSoft, IT 개발, SI, SM, 웹 솔루션">

  <!-- Open Graph / Twitter -->
  <meta property="og:title" content="VioniaSoft | {{ t.home.heroTitle }}">
  <meta property="og:description" content="VioniaSoft IT 개발 회사. 시스템 통합(SI), 서비스 관리(SM), 웹 솔루션 제공.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vioniasoft.com/index.html">
  <meta property="og:image" content="assets/images/common/vioniasoft_logo_20260105.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="VioniaSoft | {{ t.home.heroTitle }}">
  <meta name="twitter:description" content="VioniaSoft IT 개발 회사. 시스템 통합(SI), 서비스 관리(SM), 웹 솔루션 제공.">
  <meta name="twitter:image" content="assets/images/common/vioniasoft_logo_20260105.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./assets/css/base.css">
  <link rel="stylesheet" href="assets/css/nav.css">
  <link rel="stylesheet" href="./assets/css/home.css">

  <style>
    [v-cloak] {
      display: none;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>
</head>

<body>

  <div id="nav-container"></div>

  <div id="app" v-cloak>
    <main class="page page-fade-in">
      <!-- Hero -->
      <section class="hero">
        <h1 class="hero-title">{{ t.home.heroTitle }}</h1>
        <p class="hero-desc">{{ t.home.heroDesc }}</p>
      </section>

      <!-- 核心价值 -->
      <section class="values">
        <div class="value-header">
          <span class="value-line"></span>
          <h2>{{ t.home.valueTitle }}</h2>
          <span class="value-line"></span>
        </div>

        <div class="value-grid">
          <div class="value-card">
            <h3>{{ t.home.value1Title }}</h3>
            <p>{{ t.home.value1Desc }}</p>
          </div>
          <div class="value-card">
            <h3>{{ t.home.value2Title }}</h3>
            <p>{{ t.home.value2Desc }}</p>
          </div>
          <div class="value-card">
            <h3>{{ t.home.value3Title }}</h3>
            <p>{{ t.home.value3Desc }}</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <footer class="footer">
    <p>Email: info@vioniasoft.com</p>
    <p>© 2025 VioniaSoft. All rights reserved.</p>
  </footer>

  <script type="application/ld+json">
{
  "@context":"https://schema.org",
  "@type":"Organization",
  "name":"VioniaSoft",
  "url":"https://vioniasoft.com/",
  "logo":"https://vioniasoft.com/assets/images/common/vioniasoft_logo_20260105.png",
  "contactPoint":[{"@type":"ContactPoint","email":"info@vioniasoft.com","contactType":"customer support","availableLanguage":["Korean","English","Chinese","French"]}]
}
</script>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/base.js" defer></script>
  <script src="assets/js/home.js" defer></script>
  <script src="assets/js/nav.js" defer></script>

</body>

</html>

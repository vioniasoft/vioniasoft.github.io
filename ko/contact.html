	<!-- Structured Data -->
	<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "VioniaSoft",
    "url": "https://vioniasoft.com/",
    "logo": "https://vioniasoft.com/assets/images/common/vioniasoft_logo.png",
    "contactPoint": [
      {
        "@type": "ContactPoint",
        "email": "info@vioniasoft.com",
        "contactType": "customer support",
        "availableLanguage": ["Korean","English","Chinese","French"]
      }
    ]
  }
  </script>

	<!-- Vue -->
	<script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>

<body>

	<!-- Nav -->
	<!-- <div id="nav-container"></div> -->

	<!-- Vue App -->
	<main id="app" class="page contact-page">
		<!-- 页面标题 -->
		<section class="contact-overview">
			<h1 class="contact-title">문의하기</h1>
			<div class="contact-divider-animated"></div>
			<p class="contact-desc">장기적인 관점에서 신뢰할 수 있는 IT 파트너</p>
			<p class="contact-desc">VioniaSoft는 명확한 커뮤니케이션과 합리적인 의사결정을 통해 지속 가능한 협업을 지향합니다.</p>
		</section>

		<!-- 表单 -->
		<section class="contact-form-section">
			<form id="contactForm" class="contact-form" action="https://formspree.io/f/mjgbzana" method="POST"
				novalidate>
				<div class="form-row">
					<label>성명 *</label>
					<input type="text" name="name" required />
					<p class="field-error">이름을 입력해주세요.</p>
				</div>

				<div class="form-row">
					<label>이메일 *</label>
					<input type="email" name="email" required />
					<p class="field-error">이메일을 입력해주세요.</p>
				</div>

				<div class="form-row">
					<label>회사명 (선택)</label>
					<input type="text" name="company" />
				</div>

				<div class="form-row select-row">
					<label>문의 유형 *</label>
					<div id="contactTypeSelect" class="custom-select">
						<div id="contactTypeTrigger" class="select-trigger is-placeholder"
							:data-placeholder="t.contact.form.type">
							문의 유형을 선택해주세요.
						</div>
						<ul class="select-options">
							<li data-value="type1">시스템 통합 / SI</li>
							<li data-value="type2">서비스 관리 / SM</li>
							<li data-value="type3">Web · 디지털 솔루션</li>
							<li data-value="type4">기타 문의</li>
						</ul>
					</div>
					<input type="hidden" name="type" id="contactTypeValue" />
					<p class="field-error" id="typeError">문의 유형을 선택해주세요.</p>
				</div>

				<div class="form-row">
					<label>문의 내용 *</label>
					<textarea name="message" rows="4" required></textarea>
					<p class="field-error">문의 내용을 입력해주세요.</p>
				</div>

				<button type="submit" id="submitBtn" class="contact-submit">
					문의 제출
				</button>
			</form>
		</section>

	</main>

	<footer class="footer">
		<p>Email: info@vioniasoft.com</p>
		<p>© 2025 VioniaSoft. All rights reserved.</p>
	</footer>

	<!-- JS -->
	<script src="/assets/js/i18n.js"></script>
	<script src="/assets/js/base.js" defer></script>
	<script src="/assets/js/contact.js" defer></script>
	<script src="/assets/js/nav.js" defer></script>

</body>

</html>

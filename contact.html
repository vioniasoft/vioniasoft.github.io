<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | VioniaSoft</title>

  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>

<body>

  <div id="nav-container"></div>

  <main id="app" class="page" v-cloak>

    <section class="hero">
      <div class="hero-copy">
        <h1 class="hero-title">
          <span>{{ t.contact.title }}</span>
        </h1>
        <p class="hero-desc">{{ t.contact.desc1 }}</p>
        <p class="hero-desc">{{ t.contact.desc2 }}</p>
      </div>
    </section>

    <section class="values">
      <div class="value-grid">

        <div class="value-card">
          <p>{{ t.contact.email }}</p>
          <p>{{ t.contact.web }}</p>
        </div>

        <div class="value-card">
          <h3>{{ t.contact.form.submit }}</h3>
          <p>{{ t.contact.form.type1 }}</p>
          <p>{{ t.contact.form.type2 }}</p>
          <p>{{ t.contact.form.type3 }}</p>
        </div>

      </div>
    </section>

  </main>

  <footer class="footer">
    <p>Email: info@vioniasoft.com</p>
    <p>© 2025 VioniaSoft. All rights reserved.</p>
  </footer>

  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/nav.js"></script>

</body>

</html>
